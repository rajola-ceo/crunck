```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crunk Games</title>

<meta name="theme-color" content="#05070d">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
<link rel="stylesheet" href="home.css">

</head>
<body>

<div class="app">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="menu" id="menuBtn">
      <i class="bx bx-menu"></i>
    </div>

    <div class="brand">
      <h1>Crunk Games</h1>
    </div>

    <div class="icons">

      <div class="profile-dropdown">

        <img id="googleProfilePic" class="profile-pic"
        src="https://i.imgur.com/2DhmtJ4.png"
        alt="Profile">

        <div class="profile-popup">

          <div class="account-info">

            <img id="popupProfilePic"
            src="https://i.imgur.com/2DhmtJ4.png">

            <div>
              <p id="accountName">User Name</p>
              <p id="accountEmail">user@example.com</p>
            </div>

          </div>

          <button id="logoutBtn">Logout</button>

        </div>
      </div>

      <i class="bx bx-bell" id="notificationBtn"></i>

    </div>
  </header>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">

    <ul class="sidebar-menu">

      <li id="menuSettings">Settings</li>
      <li id="menuPrivacy">Privacy & Policy</li>
      <li id="menuShare">Share</li>
      <li id="menuHelp">Help / Support</li>
      <li id="menuRate">Rate App</li>
      <li id="menuAbout">About</li>
      <li id="menuTheme">
        Theme: <span id="themeLabel">Dark</span>
      </li>

    </ul>

  </div>

  <!-- SEARCH -->
  <div class="search">

    <i class="bx bx-search"></i>

    <input
      type="text"
      id="searchInput"
      placeholder="Search for Games, Competition..."
    />

  </div>

  <!-- PROMO -->
  <div class="promo">

    <div class="promo-icon">
      <i class="bx bxs-gift"></i>
    </div>

    <div class="promo-text">
      <h2>Free venocoins</h2>
    </div>

    <button class="claim">Claim</button>

  </div>

  <!-- LOADER -->
  <div id="loader" style="display:none;">

    <div class="loader-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>

  <!-- SLIDER -->
  <div class="slider">

    <div class="slides"></div>

    <div class="dots"></div>

  </div>

  <!-- GAMES GRID -->
  <div class="games" id="gamesContainer"></div>

  <!-- GAME POPUP -->
  <div id="gamePopup" class="popup">

    <div class="popup-content">

      <span class="close">✖</span>

      <img id="popupImg">

      <h2 id="popupTitle"></h2>

      <div id="popupDesc"></div>

      <div id="popupScreens"></div>

      <div id="popupTrailer"></div>

      <a id="popupDownload">
        <button>Download</button>
      </a>

    </div>

  </div>

</div>

<!-- SESSION PROTECTION -->
<script>

const user = localStorage.getItem("crunkUser");

if(!user){
  window.location.href = "index.html";
}

</script>
<div id="profileModal" class="profile-modal">

<div class="profile-box">

<span id="closeProfile">✖</span>

<img id="profileImg">

<h3 id="profileName"></h3>

<p id="profileEmail"></p>

<button id="logoutBtn">Logout</button>

</div>

</div>
<script src="home.js"></script>

</body>
</html>
