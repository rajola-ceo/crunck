<!-- Watch / Trailer Popup -->
<div class="popup" id="watchPopup">
  <div class="popup-content">
    <span class="close" onclick="closeWatchPopup()">×</span>
    <img id="watchPopupImage" src="" alt="Movie Poster">
    <video id="watchPopupVideo" controls style="display:none;"></video>
    <h2 id="watchPopupTitle">Movie Title</h2>
    <p id="watchPopupDesc">Movie description...</p>
    <button id="downloadBtn" onclick="downloadMovie()">Download</button>
    <button id="watchListBtn" onclick="addToWatchListPopup()">+ Watch List</button>
  </div>
</div>
