<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crunk Chat - Connect with Friends</title>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="chat.css">
    
    <!-- Supabase SDK (needed before chat.js) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <meta name="description" content="Chat with friends on Crunk Chat">
    <meta name="theme-color" content="#34d399">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <!-- Main Home Screen -->
        <div id="home-screen" class="screen active">
            <!-- Header -->
            <header class="header">
                <div class="top-bar">
                    <div class="logo-area">
                        <i class="fas fa-comment-dots logo-icon"></i>
                        <h2>Crunk Chat</h2>
                    </div>
                    <div class="header-actions">
                        <i class="fas fa-search nav-btn" id="search-toggle"></i>
                        <div class="profile-badge" id="profile-badge">
                            <img src="https://via.placeholder.com/32" alt="Profile" id="header-profile-pic">
                        </div>
                    </div>
                </div>
                
                <!-- Search Bar (hidden by default) -->
                <div class="search-bar hidden" id="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search messages or users..." id="global-search">
                    <i class="fas fa-times clear-search" id="clear-search"></i>
                </div>
                
                <!-- Filter Tabs -->
                <div class="filter-row">
                    <div class="filter-item active" id="tab-chats">
                        <div class="icon-circle green">
                            <i class="fas fa-message"></i>
                        </div>
                        <span>Chats</span>
                        <span class="badge" id="total-unread" style="display: none;">0</span>
                    </div>
                    <div class="filter-item" id="tab-contacts">
                        <div class="icon-circle blue">
                            <i class="fas fa-user-group"></i>
                        </div>
                        <span>Contacts</span>
                    </div>
                    <div class="filter-item" id="tab-calls">
                        <div class="icon-circle purple">
                            <i class="fas fa-phone"></i>
                        </div>
                        <span>Calls</span>
                    </div>
                </div>
            </header>

            <!-- Main Content Area -->
            <main class="content">
                <!-- Chats View -->
                <div id="chats-view" class="view active">
                    <div id="empty-chats" class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-comments"></i>
                        </div>
                        <h3>No Chats Yet</h3>
                        <p>Start a conversation with your friends</p>
                        <button class="btn-primary" onclick="window.switchTab('contacts')">
                            <i class="fas fa-user-plus"></i> Find Friends
                        </button>
                    </div>
                    <div id="recent-chats-list" class="chats-list"></div>
                </div>

                <!-- Contacts View -->
                <div id="contacts-view" class="view">
                    <div class="contacts-header">
                        <button id="invite-btn" class="btn-invite">
                            <i class="fas fa-share-alt"></i> Invite Friends
                        </button>
                    </div>
                    <div class="online-filter">
                        <span><i class="fas fa-circle" style="color: #34d399;"></i> Online</span>
                        <span><i class="fas fa-circle" style="color: #9ca3af;"></i> All</span>
                    </div>
                    <div id="user-list" class="contacts-list"></div>
                </div>

                <!-- Calls View -->
                <div id="calls-view" class="view">
                    <div id="empty-calls" class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-phone-alt"></i>
                        </div>
                        <h3>No Calls Yet</h3>
                        <p>Your call history will appear here</p>
                    </div>
                    <div id="calls-list" class="calls-list"></div>
                </div>
            </main>
        </div>

        <!-- Chat Screen -->
        <div id="chat-screen" class="screen">
            <header class="chat-header">
                <div class="chat-header-left">
                    <i class="fas fa-arrow-left" id="back-btn"></i>
                    <div class="chat-user-info" id="chat-user-info">
                        <img src="" alt="Avatar" id="chat-avatar" class="chat-avatar">
                        <div class="chat-user-details">
                            <h3 id="chat-with-name">Loading...</h3>
                            <div class="user-status">
                                <span class="status-indicator" id="chat-status-indicator"></span>
                                <small id="chat-status-text">Offline</small>
                                <span class="typing-indicator" id="typing-indicator" style="display: none;">typing...</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="chat-header-right">
                    <i class="fas fa-phone" id="voice-call-btn"></i>
                    <i class="fas fa-video" id="video-call-btn"></i>
                    <i class="fas fa-ellipsis-vertical" id="chat-menu-btn"></i>
                </div>
            </header>
            
            <!-- Chat Messages Container -->
            <div class="chat-messages" id="message-box">
                <!-- Messages will be loaded here -->
            </div>
            
            <!-- Message Input Area -->
            <div class="chat-input-area">
                <button class="attach-btn" id="attach-btn">
                    <i class="fas fa-plus"></i>
                </button>
                
                <input type="file" id="image-upload" accept="image/*,video/*" style="display: none;" multiple>
                <input type="file" id="file-upload" accept="*/*" style="display: none;">
                
                <div class="input-wrapper">
                    <input type="text" placeholder="Type a message..." id="msg-input">
                    <div class="input-actions">
                        <i class="fas fa-smile" id="emoji-btn"></i>
                        <i class="fas fa-paperclip" id="file-btn"></i>
                        <i class="fas fa-camera" id="camera-btn"></i>
                    </div>
                </div>
                
                <button class="mic-btn" id="mic-btn">
                    <i class="fas fa-microphone"></i>
                </button>
                <button class="send-btn hidden" id="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Message Reply Preview -->
    <div id="reply-preview" class="reply-preview hidden">
        <div class="reply-content">
            <span class="reply-to">Replying to <span id="reply-name"></span></span>
            <p id="reply-text"></p>
        </div>
        <i class="fas fa-times" id="close-reply"></i>
    </div>

    <!-- Image Preview Modal -->
    <div id="image-modal" class="modal hidden">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modal-image">
        <div id="modal-caption"></div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-spinner"></div>
        <p>Loading...</p>
    </div>

    <!-- Main Chat Script (module) -->
    <script type="module" src="chat.js"></script>
    
    <!-- Inline Script for PWA and Global Functions -->
    <script>
        // ================= GLOBAL TOAST FUNCTION =================
        window.showToast = function(message, type = 'info') {
            const toastContainer = document.getElementById('toast-container');
            if (!toastContainer) return;
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = 'fa-info-circle';
            if (type === 'success') icon = 'fa-check-circle';
            if (type === 'error') icon = 'fa-exclamation-circle';
            
            toast.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
            toastContainer.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 300);
                }, 2500);
            }, 100);
        };

        // ================= USER STATUS FUNCTION =================
        window.updateUserStatus = function(status) {
            console.log('User status changed to:', status);
            // Dispatch event for chat.js to listen to
            window.dispatchEvent(new CustomEvent('userStatusChanged', { 
                detail: { status } 
            }));
        };

        // ================= SERVICE WORKER =================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('✅ ServiceWorker registered:', registration);
                    })
                    .catch(error => {
                        console.log('❌ ServiceWorker registration failed:', error);
                    });
            });
        }

        // ================= VISIBILITY CHANGE HANDLER =================
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                console.log('App is visible');
                window.updateUserStatus('online');
            } else {
                console.log('App is hidden');
                window.updateUserStatus('away');
            }
        });

        // ================= NETWORK STATUS HANDLERS =================
        window.addEventListener('online', () => {
            window.showToast('You are back online!', 'success');
            window.updateUserStatus('online');
        });

        window.addEventListener('offline', () => {
            window.showToast('You are offline. Messages will send when you reconnect.', 'error');
            window.updateUserStatus('offline');
        });

        // ================= EXPOSE SWITCH TAB (will be overridden by chat.js) =================
        window.switchTab = window.switchTab || function(tab) {
            console.log('Switch tab to:', tab);
            // This will be replaced by the actual function from chat.js
        };
    </script>
</body>
</html>
