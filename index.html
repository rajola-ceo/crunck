    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
        <div class="circle circle-4"></div>
    </div>

    <div class="container">
        <!-- Logo / Brand -->
        <div class="logo-container">
            <i class="fas fa-gamepad logo-icon"></i>
            <h1>Crunk Games</h1>
            <p class="tagline">Your Ultimate Gaming Destination</p>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm">
            <!-- Username Field -->
            <div class="form-control">
                <input type="text" id="username" required autocomplete="off">
                <label>Username</label>
                <i class="fas fa-user input-icon"></i>
                <span id="usernameError" class="error-message"></span>
            </div>
            
            <!-- Email Field -->
            <div class="form-control">
                <input type="email" id="email" required autocomplete="off">
                <label>Email</label>
                <i class="fas fa-envelope input-icon"></i>
                <span id="emailError" class="error-message"></span>
            </div>
            
            <!-- Phone Number with Country Code -->
            <div class="form-control">
                <div class="phone-input-group">
                    <select id="countryCode" class="country-code" required>
                        <option value="" disabled selected>🌍 Select Code</option>
                    </select>
                    <div class="phone-input-wrapper">
                        <input type="tel" id="phone" required autocomplete="off">
                        <i class="fas fa-phone input-icon"></i>
                    </div>
                </div>
                <span id="phoneError" class="error-message"></span>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-sign-in-alt"></i>
                <span>Login / Register</span>
                <div class="btn-loader" style="display: none;"></div>
            </button>
            
            <!-- Message Display -->
            <p class="text message" id="message"></p>
        </form>
        
        <!-- Divider -->
        <div class="divider">
            <span>Or continue with</span>
        </div>
        
        <!-- Google Login Button -->
        <div class="google-login-wrapper">
            <button onclick="handleGoogleLogin()" class="btn btn-primary" style="background: #DB4437;">
                <i class="fab fa-google"></i>
                <span>Continue with Google</span>
            </button>
        </div>
        
        <!-- Alternative Login Options -->
        <div class="alt-login">
            <button class="btn-phone" onclick="showPhoneLogin()">
                <i class="fas fa-mobile-alt"></i>
                <span>Phone Login</span>
            </button>
        </div>
        
        <!-- Footer -->
        <div class="footer-links">
            <a href="#">Terms of Service</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Help</a>
        </div>
    </div>
    
    <!-- Phone Login Modal (Hidden by default) -->
    <div id="phoneModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closePhoneModal()">&times;</span>
            <h2><i class="fas fa-mobile-alt"></i> Phone Login</h2>
            <p>Enter your phone number to receive a verification code</p>
            
            <div class="modal-form">
                <div class="form-control">
                    <div class="phone-input-group">
                        <select id="modalCountryCode" class="country-code">
                            <option value="" disabled selected>🌍 Select Code</option>
                        </select>
                        <input type="tel" id="modalPhone" placeholder="Phone number">
                    </div>
                </div>
                
                <div id="recaptcha-container"></div>
                
                <button class="btn btn-primary" onclick="sendOTP()">
                    <i class="fas fa-paper-plane"></i> Send OTP
                </button>
                
                <div class="otp-section" style="display: none;">
                    <input type="text" id="otpCode" placeholder="Enter 6-digit OTP">
                    <button class="btn btn-secondary" onclick="verifyOTP()">Verify</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Loader -->
    <div id="loader" class="loader-overlay">
        <div class="loader-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <p>Loading...</p>
    </div>

        // Populate country codes
        function populateCountryCodes() {
            const selects = ['countryCode', 'modalCountryCode'];
            
            selects.forEach(selectId => {
                const select = document.getElementById(selectId);
                if (!select) return;
                
                // Clear existing options
                select.innerHTML = '<option value="" disabled selected>🌍 Select Code</option>';
                
                // Sort countries by name
                const sorted = [...countryCodes].sort((a, b) => a.country.localeCompare(b.country));
                
                sorted.forEach(country => {
                    const option = document.createElement('option');
                    option.value = country.code;
                    option.textContent = `${country.country} (${country.code})`;
                    select.appendChild(option);
                });
            });
        }
        
        // Run on load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', populateCountryCodes);
        } else {
            populateCountryCodes();
        }
        
        // ================= LABEL ANIMATION =================
        window.addEventListener('load', () => {
            const container = document.querySelector('.container');
            if (container) container.style.opacity = 1;

            const labels = document.querySelectorAll('.form-control label');
            labels.forEach(label => {
                label.innerHTML = label.innerText
                    .split('')
                    .map((letter, idx) => `<span style="transition-delay:${idx * 30}ms">${letter}</span>`)
                    .join('');
            });
        });
        
        // ================= FORM SUBMIT =================
        const form = document.getElementById('loginForm');
        const message = document.getElementById('message');
        
        if (form) {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const username = document.getElementById('username').value.trim();
                const email = document.getElementById('email').value.trim();
                const countryCodeSelect = document.getElementById('countryCode');
                const countryCode = countryCodeSelect?.value || '+1';
                const phoneNumber = document.getElementById('phone').value.trim();
                const fullPhoneNumber = countryCode + phoneNumber;
                
                // Validation
                if (!username || !email || !phoneNumber) {
                    showMessage('Please fill all fields.', 'error');
                    return;
                }
                
                if (!countryCodeSelect?.value) {
                    showMessage('Please select your country code.', 'error');
                    return;
                }
                
                if (username.length < 3) {
                    showMessage('Username must be at least 3 characters.', 'error');
                    return;
                }
                
                if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                    showMessage('Username can only contain letters, numbers, and underscores.', 'error');
                    return;
                }
                
                if (!/^\S+@\S+\.\S+$/.test(email)) {
                    showMessage('Enter a valid email address.', 'error');
                    return;
                }
                
                if (!/^\d{7,15}$/.test(phoneNumber)) {
                    showMessage('Enter a valid phone number (7-15 digits).', 'error');
                    return;
                }
                
                try {
                    showLoader(true);
                    
                    // Check if user exists
                    const usersRef = collection(db, 'users');
                    const q = query(usersRef, where('email', '==', email));
                    const querySnapshot = await getDocs(q);
                    
                    if (!querySnapshot.empty) {
                        // User exists - log them in
                        const existingUser = querySnapshot.docs[0].data();
                        localStorage.setItem('crunkUser', JSON.stringify({
                            username: existingUser.displayName || existingUser.username,
                            displayName: existingUser.displayName || existingUser.username,
                            email: existingUser.email,
                            phone: existingUser.phone,
                            photoURL: existingUser.photoURL || null,
                            userId: querySnapshot.docs[0].id
                        }));
                        
                        showMessage('Login successful! Redirecting...', 'success');
                        setTimeout(() => {
                            window.location.href = 'home.html';
                        }, 1000);
                        return;
                    }
                    
                    // Create new user
                    const userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                    
                    const newUser = {
                        uid: userId,
                        username: username,
                        displayName: username,
                        email: email,
                        phone: fullPhoneNumber,
                        countryCode: countryCode,
                        phoneNumber: phoneNumber,
                        photoURL: null,
                        loginMethod: 'form',
                        createdAt: new Date().toISOString(),
                        lastSeen: new Date().toISOString(),
                        status: 'online',
                        userId: userId
                    };
                    
                    await setDoc(doc(db, 'users', userId), newUser);
                    
                    localStorage.setItem('crunkUser', JSON.stringify({ 
                        username: username,
                        displayName: username,
                        email: email, 
                        phone: fullPhoneNumber,
                        photoURL: null,
                        userId: userId 
                    }));
                    
                    showMessage('Registration successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'home.html';
                    }, 1000);
                    
                } catch (err) {
                    console.error('Login error:', err);
                    showMessage('Error processing login. Please try again.', 'error');
                } finally {
                    showLoader(false);
                }
            });
        }
        
        // ================= GOOGLE LOGIN =================
        window.handleGoogleLogin = async function() {
            try {
                showLoader(true);
                
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                
                const userDocRef = doc(db, 'users', user.uid);
                const userDoc = await getDoc(userDocRef);
                
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    localStorage.setItem('crunkUser', JSON.stringify({
                        username: userData.displayName || user.displayName,
                        displayName: userData.displayName || user.displayName,
                        email: user.email,
                        photoURL: user.photoURL,
                        userId: user.uid
                    }));
                } else {
                    const newUser = {
                        uid: user.uid,
                        username: user.displayName,
                        displayName: user.displayName,
                        email: user.email,
                        photoURL: user.photoURL,
                        loginMethod: 'google',
                        createdAt: new Date().toISOString(),
                        lastSeen: new Date().toISOString(),
                        status: 'online',
                        userId: user.uid,
                        emailVerified: user.emailVerified
                    };
                    
                    await setDoc(userDocRef, newUser);
                    
                    localStorage.setItem('crunkUser', JSON.stringify({
                        username: user.displayName,
                        displayName: user.displayName,
                        email: user.email,
                        photoURL: user.photoURL,
                        userId: user.uid
                    }));
                }
                
                showMessage('Google login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 1000);
                
            } catch (error) {
                console.error('Google login error:', error);
                
                if (error.code === 'auth/popup-closed-by-user') {
                    showMessage('Login cancelled. Please try again.', 'info');
                } else if (error.code === 'auth/popup-blocked') {
                    showMessage('Popup was blocked. Please allow popups.', 'error');
                } else if (error.code === 'auth/account-exists-with-different-credential') {
                    showMessage('Account exists with different sign-in method.', 'error');
                } else {
                    showMessage('Error with Google login. Please try again.', 'error');
                }
            } finally {
                showLoader(false);
            }
        };
        
        // ================= HELPER FUNCTIONS =================
        function showMessage(text, type = 'info') {
            if (!message) return;
            
            message.innerText = text;
            message.className = `message ${type}`;
        }
        
        function showLoader(show) {
            const loader = document.getElementById('loader');
            if (loader) {
                loader.style.display = show ? 'flex' : 'none';
            }
        }
        
        // ================= VALIDATION =================
        const usernameInput = document.getElementById('username');
        if (usernameInput) {
            usernameInput.addEventListener('input', (e) => {
                const value = e.target.value;
                const
