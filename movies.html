<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movies App</title>
<link rel="stylesheet" href="movies.css">
<link rel="stylesheet" href="nav.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="video.css">
</head>
<body>

<div class="app">
    <h1 class="page-heading">Crunk movies</h1>

    <!-- LOADING DOTS -->
    <div id="loading">
        <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <!-- SEARCH BAR -->
    <div class="search">
        <i class="fa fa-search"></i>
        <input type="text" id="searchInput" placeholder="Explore movies, series...">
    </div>

    <!-- CATEGORY BUTTONS -->
    <nav class="nav-tabs hide-scrollbar" id="categoriesNav">
        <div class="nav-item active" data-category="for-you">For You</div>
        <div class="nav-item" data-category="movie">Movies</div>
        <div class="nav-item" data-category="series">Series</div>
        <div class="nav-item" data-category="action">Action</div>
        <div class="nav-item" data-category="horror">Horror</div>
        <div class="nav-item" data-category="adventure">Adventure</div>
        <div class="nav-item" data-category="drama">Drama</div>
        <div class="nav-item" data-category="comedy">Comedy</div>
        <div class="nav-item" data-category="top-rating">Top Rating</div>
    </nav>

    <!-- HERO SECTION -->
    <div class="hero" id="heroSection">
        <div class="hero-badge" id="heroBadge">Free</div>
        <div class="hero-title" id="heroTitle">THE LAST STAND</div>
        <div class="hero-meta" id="heroMeta">
            <span class="star">★</span> 9.8 &nbsp;|&nbsp; 2024 &nbsp;|&nbsp; 18+ &nbsp;|&nbsp; Action
        </div>
    </div>

    <!-- MOVIES SECTIONS -->
    <div id="moviesSections">
        <!-- JS will inject carousels here -->
    </div>

    <!-- WATCH POPUP -->
    <div class="popup" id="watchPopup">
      <div class="popup-content">
        <span class="close" onclick="closeWatchPopup()">×</span>

        <!-- IMAGE -->
        <img id="watchPopupImage" src="" alt="Movie Poster">

        <!-- VIDEO -->
        <iframe id="watchPopupVideo" allowfullscreen></iframe>

        <!-- INFO -->
        <h2 id="watchPopupTitle">Movie Title</h2>
        <p id="watchPopupDesc">Movie description...</p>

        <!-- QUALITY -->
        <select id="qualitySelect">
          <option value="480">480p</option>
          <option value="720">720p</option>
          <option value="1080">1080p</option>
        </select>

        <!-- ACTION BUTTONS -->
        <button id="playBtn">▶ Play Movie</button>
        <button id="trailerBtn">🎬 Watch Trailer</button>
        <button id="downloadToggle">⬇ Download</button>
        <button id="watchListBtn" onclick="addToWatchListPopup()">+ Watch List</button>

        <!-- DOWNLOAD OPTIONS -->
        <div id="downloadOptions" style="display:none;">
          <p>Select Quality:</p>
          <button onclick="downloadMovie('480')">480p (300MB)</button>
          <button onclick="downloadMovie('720')">720p (700MB)</button>
          <button onclick="downloadMovie('1080')">1080p (1.5GB)</button>
        </div>

        <!-- SERIES (hidden by default) -->
        <div id="seriesSection" style="display:none;">
          <p>Episodes:</p>
          <select id="episodeSelect"></select>
        </div>
      </div>
    </div>
</div>

<!-- NAV PLACEHOLDER -->
<div id="nav-placeholder"></div>
<div id="videoContainer"></div>

<script src="movies.js"></script>
<script src="video.js"></script>
<script src="nav.js"></script>

</body>
</html>
