<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crunk Movies - Stream Latest Movies</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="movies.css">
    <link rel="stylesheet" href="nav.css">
</head>
<body>
    <!-- Top Bar with Profile -->
    <div class="top-bar">
        <div class="logo">
            <i class="fas fa-film"></i>
            <span>Crunk Movies</span>
        </div>
        
        <div class="top-bar-right">
            <!-- Search Bar (compact) -->
            <div class="top-search">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search movies...">
                <button class="search-clear" id="searchClear"><i class="fas fa-times"></i></button>
            </div>
            
            <!-- Profile Avatar -->
            <div class="profile-container">
                <div class="profile-avatar" id="profileAvatar">
                    <!-- Will be populated by JS -->
                </div>
                
                <!-- Profile Dropdown Menu -->
                <div class="profile-menu" id="profileMenu">
                    <div class="profile-header">
                        <div class="profile-info">
                            <span class="profile-name" id="profileName">User</span>
                            <span class="profile-email" id="profileEmail">user@example.com</span>
                        </div>
                    </div>
                    <div class="profile-divider"></div>
                    <a href="profile.html" class="profile-menu-item">
                        <i class="fas fa-user"></i> My Profile
                    </a>
                    <a href="watchlist.html" class="profile-menu-item">
                        <i class="fas fa-list"></i> Watchlist
                    </a>
                    <a href="downloads.html" class="profile-menu-item">
                        <i class="fas fa-download"></i> Downloads
                    </a>
                    <a href="settings.html" class="profile-menu-item">
                        <i class="fas fa-cog"></i> Settings
                    </a>
                    <div class="profile-divider"></div>
                    <button class="profile-menu-item logout" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Search Results Dropdown -->
    <div id="searchResults" class="search-results"></div>

    <!-- Category Navigation -->
    <nav class="category-nav">
        <div class="nav-item active" data-category="for-you" tabindex="0">For You</div>
        <div class="nav-item" data-category="action" tabindex="0">Action</div>
        <div class="nav-item" data-category="horror" tabindex="0">Horror</div>
        <div class="nav-item" data-category="adventure" tabindex="0">Adventure</div>
        <div class="nav-item" data-category="comedy" tabindex="0">Comedy</div>
        <div class="nav-item" data-category="drama" tabindex="0">Drama</div>
        <div class="nav-item" data-category="top-rating" tabindex="0">Top Rated</div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section" id="heroSection">
        <div class="hero-content">
            <div class="hero-badge" id="heroBadge">HD</div>
            <h1 class="hero-title" id="heroTitle">Loading...</h1>
            <div class="hero-meta" id="heroMeta">
                <i class="fas fa-star"></i> 0.0 | 2024 | All | Movie
            </div>
            <div class="hero-actions">
                <button class="hero-play-btn" onclick="handleHeroPlay()">
                    <i class="fas fa-play"></i> Play Now
                </button>
                <button class="hero-info-btn" onclick="handleHeroInfo()">
                    <i class="fas fa-info-circle"></i> More Info
                </button>
            </div>
        </div>
    </section>

    <!-- Loading Indicator -->
    <div id="loading" class="loading">
        <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <!-- Movies Grid Sections -->
    <main id="moviesSections" class="movies-sections">
        <!-- JS will populate here -->
    </main>

    <!-- Back to Top Button -->
    <button id="backToTop" class="back-to-top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Scripts -->
    <script src="movies.js"></script>
    <script src="nav.js"></script>
</body>
</html>
